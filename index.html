<!DOCTYPE html>
<html>
<head>
  <title>brb</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Cutive Mono", monospace;
      overflow: hidden;
      transition: background 0.6s ease, color 0.6s ease;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100svh;
      text-align: center;
      background: #e0b84f;
      color: #0f0f0f;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.4;
      max-width: 90vw;
      margin: 0;

      border-right: 2px solid currentColor;

      white-space: normal;
      word-break: break-word;

      animation: blink 1s step-end infinite;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: clamp(2.2rem, 8vw, 3.2rem);
        line-height: 1.5;
      }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    .hidden {
      display: none;
    }

    .over-text {
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: #e0b84f;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <h1 id="text"></h1>
  <div id="over" class="over-text hidden">over</div>

  <script>
    const message = "hi I'm writing music rn, brb";
    const textEl = document.getElementById("text");
    const overEl = document.getElementById("over");
    const body = document.body;

    let i = 0;

    function reset() {
      textEl.innerHTML = "";
      i = 0;
      textEl.classList.remove("hidden");
      overEl.classList.add("hidden");
      overEl.classList.remove("show");

      body.style.background = "#e0b84f";
      body.style.color = "#0f0f0f";

      type();
    }

    function type() {
      if (i < message.length) {
        textEl.innerHTML += message.charAt(i);
        i++;
        setTimeout(type, 50);
      } else {
        setTimeout(loopDots, 800);
      }
    }

    function loopDots() {
      let dots = 0;

      const interval = setInterval(() => {
        dots = (dots + 1) % 4;
        textEl.innerHTML = message + ".".repeat(dots);
      }, 500);

      setTimeout(() => {
        clearInterval(interval);
        transitionToOver();
      }, 10000);
    }

    function transitionToOver() {
      textEl.classList.add("hidden");

      body.style.background = "#000";
      body.style.color = "#000";

      overEl.classList.remove("hidden");

      setTimeout(() => {
        overEl.classList.add("show");
      }, 50);

      setTimeout(() => {
        overEl.classList.remove("show");

        setTimeout(() => {
          reset();
        }, 500);
      }, 1000);
    }

    type();
  </script>
</body>
</html>
