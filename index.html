<!DOCTYPE html>
<html>
<head>
  <title>brb</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Cutive Mono", monospace;
      overflow: hidden;
      transition: background 0.6s ease, color 0.6s ease;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100svh;
      text-align: center;
      background: #e0b84f;
      color: #0f0f0f;
    }

    h1 {
      position: relative;
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3rem);
      line-height: 1.4;
    }

    #ghost {
      visibility: hidden;
      white-space: nowrap;
    }

    #textWrapper {
      position: absolute;
      top: 0;
      left: 0;
      white-space: nowrap;
    }

    #cursor {
      display: inline-block;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      opacity: 0.8;
    }

    .cursor-stop {
      animation: none;
      opacity: 1;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    body.black #cursor {
      display: none;
    }

    .hidden {
      display: none;
    }

    .over-text {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(3rem, 10vw, 4.5rem);
      color: #e0b84f;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .show {
      opacity: 1;
    }

    /* ===== MOBILE ONLY (NO STRUCTURE CHANGE, ONLY VISUAL SCALE) ===== */
    body.mobile h1 {
      font-size: 2.8rem;
      line-height: 1.9;
    }
  </style>
</head>

<body>
  <h1>
    <span id="ghost"></span>
    <span id="textWrapper">
      <span id="text"></span><span id="cursor">|</span>
    </span>
  </h1>

  <div id="over" class="over-text hidden">over</div>

  <script>
    const isMobile =
      ('ontouchstart' in window) ||
      (navigator.maxTouchPoints > 0) ||
      window.matchMedia("(pointer: coarse)").matches;

    if (isMobile) document.body.classList.add("mobile");

    const message       = "hi I'm writing music rn, brb";
    const mobileMessage = "hi\nI'm writing music rn,\nbrb";

    const ghost  = document.getElementById("ghost");
    const textEl = document.getElementById("text");
    const cursor = document.getElementById("cursor");
    const overEl = document.getElementById("over");
    const body   = document.body;

    const activeMessage = isMobile ? mobileMessage : message;

    ghost.textContent = activeMessage;

    let i = 0;
    const pauseAfter = { 1: 700, 23: 700 };

    function reset() {
      i = 0;

      body.classList.remove("black");

      textEl.classList.remove("hidden");
      cursor.classList.remove("hidden");
      cursor.classList.remove("cursor-stop");

      overEl.classList.add("hidden");
      overEl.classList.remove("show");

      body.style.background = "#e0b84f";
      body.style.color = "#0f0f0f";

      textEl.innerHTML = "";

      type();
    }

    function type() {
      if (i < activeMessage.length) {
        const char = activeMessage.charAt(i);

        if (char === "\n") {
          textEl.appendChild(document.createElement("br"));
        } else {
          textEl.insertBefore(
            document.createTextNode(char),
            cursor
          );
        }

        const delay = pauseAfter[i] !== undefined ? pauseAfter[i] : 50;
        i++;
        setTimeout(type, delay);
      } else {
        cursor.classList.add("cursor-stop");
        setTimeout(loopDots, 800);
      }
    }

    function loopDots() {
      let dots = 0;

      cursor.classList.add("hidden");

      const interval = setInterval(() => {
        dots = (dots + 1) % 4;
        textEl.innerHTML = activeMessage + ".".repeat(dots);
      }, 500);

      setTimeout(() => {
        clearInterval(interval);
        transitionToOver();
      }, 10000);
    }

    function transitionToOver() {
      textEl.classList.add("hidden");
      cursor.classList.add("hidden");

      body.style.background = "#000";
      body.style.color = "#000";
      body.classList.add("black");

      overEl.classList.remove("hidden");

      setTimeout(() => overEl.classList.add("show"), 50);

      setTimeout(() => {
        overEl.classList.remove("show");
        setTimeout(reset, 500);
      }, 1000);
    }

    function start() {
      type();
    }

    start();
  </script>
</body>
</html>
