<!DOCTYPE html>
<html>
<head>
  <title>brb</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Cutive Mono", monospace;
      overflow: hidden;
      transition: background 0.6s ease, color 0.6s ease;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e0b84f;
      color: #0f0f0f;
    }

    .container {
      position: relative;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3rem);
      line-height: 1.4;
      white-space: nowrap;
    }

    /* mobile layout */
    @media (max-width: 600px) {
      h1 {
        white-space: pre-line;
        font-size: clamp(2.8rem, 9vw, 3.8rem);
        line-height: 1.6;
        padding: 0 20px;
      }
    }

    /* invisible layout lock */
    #ghost {
      visibility: hidden;
    }

    /* typing text overlays but doesn't affect layout */
    #textLayer {
      position: absolute;
      inset: 0;
    }

    #cursor {
      display: inline-block;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      opacity: 0.8;
    }

    .cursor-stop {
      animation: none;
      opacity: 1;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .hidden {
      display: none;
    }

    .over-text {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;

      font-size: clamp(3rem, 10vw, 4.5rem);
      color: #e0b84f;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>
      <span id="ghost"></span>
      <span id="textLayer">
        <span id="text"></span><span id="cursor">|</span>
      </span>
    </h1>

    <div id="over" class="over-text hidden">over</div>

  </div>

  <script>
    const isMobile = window.innerWidth <= 600;

    const message = isMobile
      ? "hi I'm writing\nmusic rn,\nbrb"
      : "hi I'm writing music rn, brb";

    const ghost = document.getElementById("ghost");
    const textEl = document.getElementById("text");
    const cursor = document.getElementById("cursor");
    const overEl = document.getElementById("over");
    const body = document.body;

    // lock layout BEFORE typing
    ghost.textContent = message;

    let i = 0;

    function reset() {
      textEl.innerHTML = "";
      i = 0;

      cursor.classList.remove("hidden");
      cursor.classList.remove("cursor-stop");

      overEl.classList.add("hidden");
      overEl.classList.remove("show");

      body.style.background = "#e0b84f";
      body.style.color = "#0f0f0f";

      type();
    }

    function type() {
      if (i < message.length) {
        textEl.innerHTML += message.charAt(i);
        i++;
        setTimeout(type, 50);
      } else {
        cursor.classList.add("cursor-stop");
        setTimeout(loopDots, 800);
      }
    }

    function loopDots() {
      let dots = 0;

      const interval = setInterval(() => {
        dots = (dots + 1) % 4;
        textEl.innerHTML = message + ".".repeat(dots);
      }, 500);

      setTimeout(() => {
        clearInterval(interval);
        transitionToOver();
      }, 10000);
    }

    function transitionToOver() {
      document.querySelector("h1").classList.add("hidden");
      cursor.classList.add("hidden");

      body.style.background = "#000";
      body.style.color = "#000";

      overEl.classList.remove("hidden");

      setTimeout(() => {
        overEl.classList.add("show");
      }, 50);

      setTimeout(() => {
        overEl.classList.remove("show");

        setTimeout(() => {
          document.querySelector("h1").classList.remove("hidden");
          reset();
        }, 500);
      }, 1000);
    }

    type();
  </script>
</body>
</html>
