<!DOCTYPE html>
<html>
<head>
  <title>brb</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Cutive Mono", monospace;
      overflow: hidden;
      transition: background 0.6s ease, color 0.6s ease;

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100svh;
      text-align: center;
      background: #e0b84f;
      color: #0f0f0f;
    }

    h1 {
      position: relative;
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3rem);
      line-height: 1.4;
    }

    /* invisible full text (locks layout) */
    #ghost {
      visibility: hidden;
      white-space: nowrap;
    }

    /* actual typing layer */
    #textWrapper {
      position: absolute;
      top: 0;
      left: 0;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      #ghost, #textWrapper {
        white-space: pre-line;
      }

      h1 {
        font-size: clamp(2.8rem, 9vw, 3.8rem);
        line-height: 1.6;
        padding: 0 20px;

        white-space: pre-line; /* ✅ controlled line breaks */
        max-width: 90vw;
      }
    }

    #cursor {
      display: inline-block;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      opacity: 0.8;
    }

    .cursor-stop {
      animation: none;
      opacity: 1;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* hide cursor during black screen */
    body.black #cursor {
      display: none;
    }

    .hidden {
      display: none;
    }

    /* centered "over" */
    .over-text {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;

      font-size: clamp(3rem, 10vw, 4.5rem);
      color: #e0b84f;

      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <h1>
    <span id="ghost"></span>

    <span id="textWrapper">
      <span id="text"></span><span id="cursor">|</span>
    </span>
  </h1>

  <div id="over" class="over-text hidden">over</div>

  <script>
    const isMobile = window.innerWidth <= 600;

    const message = isMobile
      ? "hi I'm writing\nmusic rn,\nbrb"
      : "hi I'm writing music rn, brb";

    const ghost = document.getElementById("ghost");
    const textEl = document.getElementById("text");
    const cursor = document.getElementById("cursor");
    const overEl = document.getElementById("over");
    const body = document.body;

    ghost.textContent = message;

    let i = 0;

    function reset() {
      textEl.innerHTML = "";
      i = 0;

      body.classList.remove("black");

      textEl.classList.remove("hidden");
      cursor.classList.remove("hidden");
      cursor.classList.remove("cursor-stop");

      overEl.classList.add("hidden");
      overEl.classList.remove("show");

      body.style.background = "#e0b84f";
      body.style.color = "#0f0f0f";

      type();
    }

    function type() {
      if (i < message.length) {
        textEl.innerHTML += message.charAt(i);
        i++;
        setTimeout(type, 50);
      } else {
        cursor.classList.add("cursor-stop");
        setTimeout(loopDots, 800);
      }
    }

    function loopDots() {
      let dots = 0;

      const interval = setInterval(() => {
        dots = (dots + 1) % 4;
        textEl.innerHTML = message + ".".repeat(dots);
      }, 500);

      setTimeout(() => {
        clearInterval(interval);
        transitionToOver();
      }, 10000);
    }

    function transitionToOver() {
      textEl.classList.add("hidden");
      cursor.classList.add("hidden");

      body.style.background = "#000";
      body.style.color = "#000";
      body.classList.add("black");

      overEl.classList.remove("hidden");

      setTimeout(() => {
        overEl.classList.add("show");
      }, 50);

      setTimeout(() => {
        overEl.classList.remove("show");

        setTimeout(() => {
          reset();
        }, 500);
      }, 1000);
    }

    type();
  </script>
</body>
</html>
